<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification Successful — Smivo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1a3a6b;
      --primary-light: #2a5298;
      --accent: #e8b630;
      --accent-light: #fef3c7;
      --text: #1e293b;
      --text-light: #64748b;
      --bg: #ffffff;
      --surface: #f8fafc;
      --border: #e2e8f0;
      --radius: 16px;
      --success: #10b981;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.06);
    }

    .icon-wrapper {
      width: 80px;
      height: 80px;
      background: #ecfdf5;
      color: var(--success);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      margin: 0 auto 24px;
      font-size: 40px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    p {
      color: var(--text-light);
      line-height: 1.6;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 14px 24px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      transition: transform 0.2s, background 0.2s;
    }

    .btn:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
    }

    .footer-text {
      margin-top: 24px;
      font-size: 0.8rem;
      color: var(--text-light);
    }

    /* Animation */
    .card {
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon-wrapper">✓</div>
    <h1>Verification Successful</h1>
    <p>Your email has been verified. You can now access all features of the Smivo marketplace.</p>
    
    <a href="smivo://auth/callback" class="btn" id="open-app-btn">Open Smivo App</a>
    
    <div class="footer-text">
      You can close this window now.
    </div>
  </div>

  <script>
    // NOTE: After Supabase verifies the email, it redirects here with auth
    // tokens in the URL fragment:
    //   https://smivo.io/auth/callback#access_token=eyJ...&refresh_token=xxx&type=signup
    //
    // We extract these tokens and pass them to the app via deep link so the
    // app can call setSession() and auto-login the user without requiring
    // them to re-enter their password.
    //
    // Tokens in URL fragments (#) are never sent to the server — they only
    // exist in the browser, making this as secure as a standard OAuth callback.

    (function() {
      var hash = window.location.hash.substring(1);
      if (!hash) return;

      var params = new URLSearchParams(hash);
      var accessToken = params.get('access_token');
      var refreshToken = params.get('refresh_token');

      if (!accessToken || !refreshToken) return;

      // Build the deep link with tokens as query parameters.
      // Using query params (not fragment) because Dart's Uri parser handles
      // them more reliably across iOS and Android custom URL schemes.
      var deepLink = 'smivo://auth/callback'
        + '?access_token=' + encodeURIComponent(accessToken)
        + '&refresh_token=' + encodeURIComponent(refreshToken);

      // Update the button to carry the tokens
      var btn = document.getElementById('open-app-btn');
      if (btn) btn.href = deepLink;

      // Auto-open the app after a short delay
      setTimeout(function() {
        window.location.href = deepLink;
      }, 1500);
    })();
  </script>
</body>
</html>
