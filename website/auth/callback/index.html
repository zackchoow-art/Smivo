<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification Successful — Smivo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1a3a6b;
      --primary-light: #2a5298;
      --text: #1e293b;
      --text-light: #64748b;
      --bg: #ffffff;
      --border: #e2e8f0;
      --radius: 16px;
      --success: #10b981;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.06);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .icon-wrapper {
      width: 80px;
      height: 80px;
      background: #ecfdf5;
      color: var(--success);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      margin: 0 auto 24px;
      font-size: 40px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    p {
      color: var(--text-light);
      line-height: 1.6;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 14px 24px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      transition: transform 0.2s, background 0.2s;
    }

    .btn:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
    }

    .footer-text {
      margin-top: 24px;
      font-size: 0.8rem;
      color: var(--text-light);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon-wrapper">✓</div>
    <h1>Verification Successful</h1>
    <p>Your email has been verified. You can now access all features of the Smivo marketplace.</p>

    <!-- Default href is updated by JS below once auth data is extracted -->
    <a href="smivo://auth/callback" class="btn" id="open-app-btn">Open Smivo App</a>

    <div class="footer-text">
      You can close this window now.
    </div>
  </div>

  <script>
    // NOTE: supabase_flutter v2+ uses PKCE auth flow by default.
    //
    // PKCE flow — Supabase redirects here with ?code=xxx in query string:
    //   https://smivo.io/auth/callback?code=xxx&type=signup
    //
    // Legacy implicit flow — tokens arrive in the URL hash (#):
    //   https://smivo.io/auth/callback#access_token=xxx&refresh_token=xxx
    //
    // We detect whichever is present, build a deep link, and open the app
    // so it can exchange the code (or tokens) for a Supabase session.
    // URL fragments (#) are never sent to the server, so both flows are safe.

    (function () {
      var deepLink = null;

      // ── PKCE flow: code is in the query string ──────────────────────────
      var searchParams = new URLSearchParams(window.location.search);
      var code = searchParams.get('code');
      if (code) {
        deepLink = 'smivo://auth/callback?code=' + encodeURIComponent(code);
      }

      // ── Implicit flow: tokens are in the URL hash ───────────────────────
      if (!deepLink) {
        var hash = window.location.hash.substring(1); // strip leading '#'
        if (hash) {
          var hashParams = new URLSearchParams(hash);
          var accessToken  = hashParams.get('access_token');
          var refreshToken = hashParams.get('refresh_token');
          if (accessToken && refreshToken) {
            deepLink = 'smivo://auth/callback'
              + '?access_token='  + encodeURIComponent(accessToken)
              + '&refresh_token=' + encodeURIComponent(refreshToken);
          }
        }
      }

      // No auth data in the URL — leave the default button href as-is
      if (!deepLink) return;

      // Update the button so a manual tap also carries the auth data
      var btn = document.getElementById('open-app-btn');
      if (btn) btn.href = deepLink;

      // Auto-open the app after a short delay
      setTimeout(function () {
        window.location.href = deepLink;
      }, 1500);
    })();
  </script>
</body>
</html>
